name: CI

on:
  push:
  pull_request:
  schedule:
    - cron: '0 6 * * *'

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        browser: [chrome, firefox]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run API tests
        env:
          PETSTORE_API_KEY: ${{ secrets.PETSTORE_API_KEY }}
        run: |
          pytest -m api --junitxml=reports/junit.xml

      - name: Run UI tests
        env:
          BROWSER: ${{ matrix.browser }}
          HEADLESS: 'true'
        run: |
          pytest -m ui --html=reports/report-${{ matrix.browser }}.html

      - name: Archive reports
        uses: actions/upload-artifact@v4
        with:
          name: reports-${{ matrix.browser }}
          path: reports/

